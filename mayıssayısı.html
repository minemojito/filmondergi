<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayıs 2026 - Filmon Dergi</title>
    <style>
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%;
            border-bottom: 1px solid #eeeeee;
            position: sticky;
            top: 0;
            background-color: rgba(255, 255, 255, 0.95);
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            color: #000000;
        }

        .back-button {
            text-decoration: none;
            color: #555555;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-button:hover {
            color: #000000;
        }

        .magazine-reader {
            max-width: 1100px;
            margin: 60px auto;
            padding: 0 5%;
            display: flex;
            flex-direction: column;
            gap: 60px;
        }

        .single-page {
            width: 50%;
            margin: 0 auto;
            display: block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            height: auto;
        }

        .magazine-spread {
            display: flex;
            width: 100%;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .magazine-spread img {
            width: 50%;
            display: block;
            height: auto;
        }
        
        @media (max-width: 768px) {
            .single-page {
                width: 100%;
            }
            .magazine-spread {
                flex-direction: column;
                box-shadow: none;
            }
            .magazine-spread img {
                width: 100%;
                box-shadow: 0 4px 15px rgba(0,0,0,0.08);
                margin-bottom: 20px;
            }
        }

        /* Eklenen Footer Stilleri */
        footer {
            text-align: center;
            padding: 60px 5%;
            border-top: 1px solid #eeeeee;
            margin-top: 80px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .footer-links a {
            text-decoration: none;
            color: #555555;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: #000000;
        }

        .copyright {
            font-size: 12px;
            color: #aaaaaa;
            margin: 0;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">F.</a>
        <a href="index.html" class="back-button">Ana Sayfaya Dön</a>
    </header>

    <main class="magazine-reader">
        
        <img src="bitirme projesi.jpg" alt="Ön Kapak" class="single-page">

        <div class="magazine-spread">
            <img src="bitirme projesi2.jpg" alt="Sayfa 2">
            <img src="bitirme projesi3.jpg" alt="Sayfa 3">
        </div>

        <div class="magazine-spread">
            <img src="bitirme projesi4.jpg" alt="Sayfa 4">
            <img src="bitirme projesi5.jpg" alt="Sayfa 5">
        </div>

        <div class="magazine-spread">
            <img src="bitirme projesi6.jpg" alt="Sayfa 6">
            <img src="bitirme projesi7.jpg" alt="Sayfa 7">
        </div>

        <div class="magazine-spread">
            <img src="bitirme projesi8.jpg" alt="Sayfa 8">
            <img src="bitirme projesi9.jpg" alt="Sayfa 9">
        </div>

        <div class="magazine-spread">
            <img src="bitirme projesi10.jpg" alt="Sayfa 10">
            <img src="bitirme projesi11.jpg" alt="Sayfa 11">
        </div>

        <div class="magazine-spread">
            <img src="bitirme projesi12.jpg" alt="Sayfa 12">
            <img src="bitirme projesi13.jpg" alt="Sayfa 13">
        </div>

        <div class="magazine-spread">
            <img src="bitirme projesi14.jpg" alt="Sayfa 14">
            <img src="bitirme projesi15.jpg" alt="Sayfa 15">
        </div>

        <img src="bitirme projesi16.jpg" alt="Arka Kapak" class="single-page">

    </main>

    <footer>
        <div class="footer-links">
            <a href="https://instagram.com/filmon" target="_blank">Instagram</a>
            <a href="hakkinda.html#contact">İletişim</a>
        </div>
        <p class="copyright">&copy; 2026 Filmon. Tüm hakları saklıdır.</p>
    </footer>

</body>
</html>
